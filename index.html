<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <div class="notebook">

      <!-- Spiral holes -->
      <div class="spirals">
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
      </div>

      <div class="content">
        <div class="title-area">
          <span class="label">My Calculator ✏️</span>
          <span class="doodle">★</span>
        </div>

        <!-- Display -->
        <div class="display-box">
          <div class="tape" id="tape"></div>
          <div class="screen">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="keypad">
          <button class="btn btn-func" data-action="clear">AC</button>
          <button class="btn btn-func" data-action="sign">+/−</button>
          <button class="btn btn-func" data-action="percent">%</button>
          <button class="btn btn-op"   data-action="operator" data-value="÷">÷</button>

          <button class="btn" data-action="digit" data-value="7">7</button>
          <button class="btn" data-action="digit" data-value="8">8</button>
          <button class="btn" data-action="digit" data-value="9">9</button>
          <button class="btn btn-op"   data-action="operator" data-value="×">×</button>

          <button class="btn" data-action="digit" data-value="4">4</button>
          <button class="btn" data-action="digit" data-value="5">5</button>
          <button class="btn" data-action="digit" data-value="6">6</button>
          <button class="btn btn-op"   data-action="operator" data-value="−">−</button>

          <button class="btn" data-action="digit" data-value="1">1</button>
          <button class="btn" data-action="digit" data-value="2">2</button>
          <button class="btn" data-action="digit" data-value="3">3</button>
          <button class="btn btn-op"   data-action="operator" data-value="+">+</button>

          <button class="btn btn-zero" data-action="digit" data-value="0">0</button>
          <button class="btn"          data-action="decimal">.</button>
          <button class="btn btn-eq"   data-action="equals">=</button>
        </div>

        <!-- Little doodles at the bottom -->
        <div class="footer-doodles">
          <span>~made with ♥~</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/calculator.js"></script>
</body>
</html>
